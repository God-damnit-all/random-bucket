name: CI

on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    if: ${{ github.actor != 'dependabot[bot]' }}
    name: Check for bucket manifest changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      bucket: ${{ steps.filter.outputs.bucket }}
    steps:
    - uses: actions/checkout@v7
    - uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          bucket:
          - bucket/**
  test:
    needs: changes
    if: ${{ needs.changes.outputs.bucket == 'true' }}
    name: Test manifests
    runs-on: windows-latest
    strategy:
      matrix:
        shell: [powershell, pwsh]
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      -
        name: Checkout Bucket
        uses: actions/checkout@v7
        with:
          # Need at least 2 commits to properly gather changed files for linting
          fetch-depth: 2
          path: my_bucket
      -
        name: Checkout Scoop
        uses: actions/checkout@v7
        with:
          repository: ScoopInstaller/Scoop
          path: scoop_core
      -
        name: Install and cache test dependencies
        uses: potatoqualitee/psmodulecache@v6.3
        with:
          modules-to-cache: BuildHelpers, Pester
          shell: ${{ matrix.shell }}
      -
        name: Run tests
        run: |
          $env:SCOOP_HOME="$(Convert-Path '.\scoop_core')"
          .\my_bucket\bin\test.ps1
