on:
  workflow_dispatch:
  schedule:
    # run every 8 hours: https://ncrontab.swimburger.net
    #- cron: '20 */8 * * *'
    # run every 24 hours: https://ncrontab.swimburger.net
    - cron: '0 0 * * *'
name: Excavator
jobs:
  excavate:
    name: Excavate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Excavate
        uses: ScoopInstaller/GithubActions@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_UPDATED: 1
